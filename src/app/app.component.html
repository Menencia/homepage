<div class="uk-container uk-margin-top">
  <div class="uk-grid-divider" uk-grid>
    <div class="uk-width-1-3@m uk-text-center">
      <h1><em>Menencia</em>'s homepage</h1>

    </div>

    <div class="uk-width-2-3@m">
      <div>
        <ul *ngIf="projects; else loading" class="uk-list uk-list-divider">
          <li *ngFor="let project of projects" (click)="openLink(project)">
            <span class="uk-align-right uk-label" *ngIf="project.status=='active'">
              {{ project.status | status }}
            </span>
            <span class="uk-text-bold">{{ project.name }}</span>
            <span class="uk-text-small uk-text-muted">#{{ project.code }}</span>
            <br /><span class="uk-text-small">{{ project.desc }}</span>
          </li>
        </ul>
        <ng-template #loading>
          <div uk-spinner></div>
        </ng-template>
      </div>

      <hr />

      <div class="uk-text-italic uk-text-small uk-text-muted">
        <span uk-icon="future"></span> Mis à jour le {{ updated | date }}
      </div>
    </div>

    <img class="uk-align-center uk-hidden@m" src="assets/bg.jpg" />
  </div>
</div>
